# ========== REDIS CONFIGURACIÓN PARA JARAMILLOMORA ==========

# RED GENERAL
bind 0.0.0.0
port 6390
tcp-backlog 511
timeout 0
tcp-keepalive 300

# SEGURIDAD
# La contraseña se pasa por comando, pero dejamos configuración base
protected-mode yes

# PERSISTENCIA
# RDB (Snapshot)
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF (Append Only File)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# LUA
lua-time-limit 5000

# REPLICACIÓN (para futuros clusters)
# replicaof <masterip> <masterport>
# masterauth <master-password>

# SLOW LOG (Debugging)
slowlog-log-slower-than 10000
slowlog-max-len 128

# LATENCY MONITOR
latency-monitor-threshold 100

# NOTIFICACIONES
notify-keyspace-events "Ex"
# Solo eventos de expiración

# LIMITES DE CLIENTES
maxclients 10000

# RENDIMIENTO
hz 10
dynamic-hz yes
activerehashing yes
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ZONA HORARIA
# Se usa la variable TZ del container